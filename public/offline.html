<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Level Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0A0A0A; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container { text-align: center; padding: 2rem; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: rgba(255,255,255,0.5); font-size: 0.875rem; line-height: 1.5; }
    .retry {
      margin-top: 1.5rem; display: inline-block; padding: 0.75rem 1.5rem;
      background: #E51A1A; color: #fff; border: none; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 600; cursor: pointer; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Check your internet connection and try again.</p>
    <a href="/" class="retry" onclick="location.reload(); return false;">Retry</a>
  </div>
</body>
</html>
